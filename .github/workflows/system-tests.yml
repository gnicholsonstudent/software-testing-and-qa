name: System Tests
description: Run Postman collection API tests against deployed API.

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  smoke-tests:
    name: Smoke Tests (ST)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman collection
        working-directory: src/tests/ReferenceDataApi.SystemTests
        run: |
          newman run smoke-tests.json --environment environment.json

  functional-tests:
    name: Functional Tests (FT)
    needs: smoke-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman collection
        working-directory: src/tests/ReferenceDataApi.SystemTests
        run: |
          newman run functional-tests.json --environment environment.json

  authentication-tests:
    name: Authentication Tests (AT)
    needs: functional-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman collection
        working-directory: src/tests/ReferenceDataApi.SystemTests
        run: |
          newman run authentication-tests.json --environment environment.json